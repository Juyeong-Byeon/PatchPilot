name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    # Blocks the merge if a committed secret is detected. Self-contained (no deps,
    # no build) so it runs fast and fails independently of the rest of CI. Make
    # this a required status check in branch protection to enforce the gate.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scan tracked files for secrets
        run: npm run scan:secrets

  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier (format check)
        run: npm run format:check

      # Typecheck runs before lint because it emits each workspace's dist/ .d.ts
      # (tsc -p, not --noEmit). The type-aware ESLint rules (and the tests) resolve
      # @ticket-to-pr/* through those declarations, so they must exist first.
      - name: Typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  db-migrate:
    name: DB migrate dry-run (schema drift)
    runs-on: ubuntu-latest
    # Applies the schema to a throwaway Postgres, then re-applies it. The schema
    # is fully idempotent (create ... if not exists), so a second apply must be a
    # no-op. A non-idempotent change (or schema drift) fails the second run and
    # blocks the PR before it reaches a real database.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ticket_to_pr
          POSTGRES_USER: ticket_to_pr
          POSTGRES_PASSWORD: ticket_to_pr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ticket_to_pr -d ticket_to_pr"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://ticket_to_pr:ticket_to_pr@localhost:5432/ticket_to_pr
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npm run db:migrate

      - name: Re-apply migrations (idempotency / drift check)
        run: npm run db:migrate
