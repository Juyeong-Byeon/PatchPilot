name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    # Blocks the merge if a committed secret is detected. Self-contained (no deps,
    # no build) so it runs fast and fails independently of the rest of CI. Make
    # this a required status check in branch protection to enforce the gate.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Scan tracked files for secrets
        run: npm run scan:secrets

  commitlint:
    name: Commit messages (conventional)
    runs-on: ubuntu-latest
    # semantic-release derives the next version from Conventional Commit types
    # (feat/fix/…), so the commit format must hold or releases compute the wrong
    # version (or none). Lints every commit in the PR's base..head range; merge
    # commits are ignored by commitlint's defaults. Skipped on push to main — those
    # commits were already linted on their PR.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the PR's commits (and their parents) to lint the range.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint PR commit messages
        run: npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier (format check)
        run: npm run format:check

      # Typecheck runs before lint because it emits each workspace's dist/ .d.ts
      # (tsc -p, not --noEmit). The type-aware ESLint rules (and the tests) resolve
      # @ticket-to-pr/* through those declarations, so they must exist first.
      - name: Typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  db-migrate:
    name: DB migrate dry-run (schema drift)
    runs-on: ubuntu-latest
    # Applies the schema to a throwaway Postgres, then re-applies it. The schema
    # is fully idempotent (create ... if not exists), so a second apply must be a
    # no-op. A non-idempotent change (or schema drift) fails the second run and
    # blocks the PR before it reaches a real database.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ticket_to_pr
          POSTGRES_USER: ticket_to_pr
          POSTGRES_PASSWORD: ticket_to_pr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ticket_to_pr -d ticket_to_pr"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://ticket_to_pr:ticket_to_pr@localhost:5432/ticket_to_pr
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npm run db:migrate

      - name: Re-apply migrations (idempotency / drift check)
        run: npm run db:migrate

  dockerfile-lint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    # Lints every Dockerfile for build best-practices. `failure-threshold: error`
    # means only DLxxxx *errors* fail the job — warnings/info surface in the logs
    # without blocking, so this is a useful signal without being noisy. Pilot per
    # docs/library-adoption-plan.md (Tier 2).
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - docker/api.Dockerfile
          - docker/worker.Dockerfile
          - docker/runner.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Lint ${{ matrix.dockerfile }}
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: error

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    # Advisory pilot ALONGSIDE the existing zero-install `secret-scan` job, to
    # compare signal before deciding whether to replace it (Tier 2). `continue-on-
    # error` keeps it from blocking merges while we evaluate false-positive rate;
    # findings still surface in the job logs. Allowlisting lives in .gitleaks.toml.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans commit history, so it needs the full clone.
          fetch-depth: 0

      # Run the gitleaks CLI via its official image rather than the v2 Action: the
      # Action drives the GitHub PR API (fetch commits / post a summary) and needs
      # extra token permissions, which is overkill for an advisory scan and crashes
      # under the default read-only token. The CLI scans full history directly.
      - name: Run gitleaks (full history)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/repo" ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --config=/repo/.gitleaks.toml --redact --no-banner --verbose

  release:
    name: Release (semantic-release)
    runs-on: ubuntu-latest
    # Cut releases only from main, and only after the core gate is green. On PRs
    # this job is skipped; on push to main it waits for verify/secret-scan/db-migrate
    # so a broken or secret-leaking commit never produces a tag or GitHub Release.
    needs: [secret-scan, verify, db-migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write # create the git tag + GitHub Release
      issues: write # comment on released issues
      pull-requests: write # comment on released PRs
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so commit-analyzer sees every commit since the last
          # release; persist-credentials off so semantic-release pushes the tag with
          # GITHUB_TOKEN rather than the checkout's stored credentials.
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
