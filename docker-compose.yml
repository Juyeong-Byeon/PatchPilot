services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ticket_to_pr
      POSTGRES_USER: ticket_to_pr
      POSTGRES_PASSWORD: ticket_to_pr
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_to_pr -d ticket_to_pr"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "${HOST_API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      WORKER_WORKSPACE_ROOT: /work/jobs
      WORKER_WORKSPACE_HOST_ROOT: ${WORKER_WORKSPACE_HOST_ROOT:-${PWD}/work/jobs}
      GSTACK_COMMAND: ${GSTACK_COMMAND:-}
      GSTACK_ARGS: ${GSTACK_ARGS:-}
      CODEX_AUTH_FILE: ${CODEX_AUTH_FILE:-}
      CODEX_CONFIG_FILE: ${CODEX_CONFIG_FILE:-}
      CODEX_SKILLS_DIR: ${CODEX_SKILLS_DIR:-}
      GSTACK_SKILL_SOURCE_DIR: ${GSTACK_SKILL_SOURCE_DIR:-}
    volumes:
      - ./work:/work
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  runner-image:
    profiles:
      - build
    image: ${RUNNER_IMAGE:-ticket-to-pr-runner:local}
    build:
      context: .
      dockerfile: docker/runner.Dockerfile
      args:
        GSTACK_INSTALL_COMMAND: ${GSTACK_INSTALL_COMMAND:-}
    command: ["node", "apps/runner/dist/main.js"]

volumes:
  postgres-data:
