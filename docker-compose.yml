services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ticket_to_pr
      POSTGRES_USER: ticket_to_pr
      POSTGRES_PASSWORD: ticket_to_pr
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_to_pr -d ticket_to_pr"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        # Stamp the build version + commit into the image so GET /api/version (and
        # the admin's bottom-left VersionBadge) report what is running. Populated by
        # scripts/build-stamp.mjs via reset:db / update; empty for a bare build.
        APP_VERSION: ${APP_VERSION:-}
        GIT_SHA: ${GIT_SHA:-}
    env_file:
      - path: .env
        required: false
    ports:
      - "${HOST_API_PORT:-3000}:3000"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    environment:
      # Full-Docker default: proxy to the Compose API service. dev:watch overrides
      # this to host.docker.internal:<HOST_API_PORT> because API runs on the host.
      VITE_ADMIN_API_BASE_URL: ${VITE_ADMIN_API_BASE_URL:-http://api:3000}
      ADMIN_ALLOWED_HOSTS: ${ADMIN_ALLOWED_HOSTS:-}
      VITE_ADMIN_ALLOWED_HOSTS: ${VITE_ADMIN_ALLOWED_HOSTS:-}
      HOST_API_PORT: ${HOST_API_PORT:-3000}
    ports:
      - "${HOST_ADMIN_PORT:-5173}:5173"
    volumes:
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
      - ./apps/admin:/app/apps/admin
      - admin-node-modules:/app/node_modules
    command: ["npm", "--workspace", "@ticket-to-pr/admin", "run", "dev", "--", "--host", "0.0.0.0"]

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      WORKER_WORKSPACE_ROOT: /work/jobs
      WORKER_WORKSPACE_HOST_ROOT: ${WORKER_WORKSPACE_HOST_ROOT:-${PWD}/work/jobs}
      GSTACK_COMMAND: ${GSTACK_COMMAND:-}
      GSTACK_ARGS: ${GSTACK_ARGS:-}
      CODEX_AUTH_FILE: ${CODEX_AUTH_FILE:-}
      CODEX_CONFIG_FILE: ${CODEX_CONFIG_FILE:-}
      CODEX_SKILLS_DIR: ${CODEX_SKILLS_DIR:-}
      GSTACK_SKILL_SOURCE_DIR: ${GSTACK_SKILL_SOURCE_DIR:-}
    volumes:
      - ./work:/work
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  runner-image:
    profiles:
      - build
    image: ${RUNNER_IMAGE:-ticket-to-pr-runner:local}
    build:
      context: .
      dockerfile: docker/runner.Dockerfile
      args:
        GSTACK_INSTALL_COMMAND: ${GSTACK_INSTALL_COMMAND:-}
    command: ["node", "apps/runner/dist/main.js"]

volumes:
  postgres-data:
  admin-node-modules:
